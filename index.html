<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Socket.IO Notification Test</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    #log {
      background: #f2f2f2;
      padding: 15px;
      height: 300px;
      overflow-y: auto;
      border-radius: 5px;
    }
    .notify {
      margin-bottom: 10px;
      padding: 10px;
      background: #d9eaff;
      border-left: 4px solid #007bff;
    }
  </style>
</head>

<body>
  <h2>Socket.IO Notification Demo</h2>

  <button onclick="joinNotificationRoom()">
    Join Notification Room
  </button>

  <h3>Incoming Notifications:</h3>
  <div id="log"></div>

  <!-- Socket.IO CDN -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    const socket = io("http://localhost:5000", {
      auth: {
        token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OTM2ZGNmNDQwOWQyNGEwODMxZjJhNWQiLCJpYXQiOjE3NjU5OTE5NzcsImV4cCI6MTc2NjA3ODM3N30.rb3vZiRRTQ_FFqH5JH2Vn4XvzosXNA_UJ4tO2tiLIQw"
      },
      transports: ["polling", "websocket"],
      path: "/socket.io/"
    });

    socket.on("connect", () => {
      console.log("Connected:", socket.id);
    });

    // ✅ JOIN NOTIFICATION ROOM (NO USER ID SENT)
    function joinNotificationRoom() {
      socket.emit("notification:join");
      alert("Joined notification room (userId from token)");
    }

    // ✅ RECEIVE NOTIFICATIONS
    socket.on("notification:receive", (data) => {
      console.log("New Notification:", data);

      const logDiv = document.getElementById("log");
      const el = document.createElement("div");
      el.className = "notify";
      el.innerHTML = `
        <strong>${data.type}</strong>: ${data.message}
        <br/>
        <small>${new Date(data.createdAt).toLocaleString()}</small>
      `;
      logDiv.appendChild(el);

      logDiv.scrollTop = logDiv.scrollHeight;
    });

    // ======================
    // TENDER EVENTS
    // ======================

    socket.on("tender:created", (data) => {
      console.log("New Tender Created:", data);
      alert("New Tender: " + data.name);
    });

    socket.on("tender:addTenderNotice", (data) => {
      console.log("Tender addTenderNotice:", data);
      alert("Tender Notice Added: " + data.name);
    });

    socket.on("tender:addTenderNoticeDays", (data) => {
      console.log("Tender addTenderNoticeDays:", data);
      alert("Tender Notice Days Updated: " + data.name);
    });

    socket.on("tender:updateTenderStatus", (data) => {
      console.log("Tender updateTenderStatus:", data);
      alert("Tender Status Updated: " + data.name);
    });

    socket.on("tender:deleteTender", (data) => {
      console.log("Tender deleteTender:", data);
      alert("Tender Deleted");
    });

    socket.on("tender:tenderAccepted", (data) => {
      console.log("Tender Accepted:", data);
    });

    socket.on("tender:tenderAcceptedByCM", (data) => {
      console.log("Tender Accepted By CM:", data);
    });

    socket.on("tender:TenderApprove", (data) => {
      console.log("Tender Approved:", data);
    });
    socket.on("tender:tenderForCM", (data) => {
      console.log("Tender tenderForCM:", data);
    });
    socket.on("tender:tenderForGM", (data) => {
      console.log("Tender tenderForGM:", data);
    });

  </script>
</body>
</html>
